<!DOCTYPE html>
<html class="dark" lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MIRAI ATELIER — Team Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "surface-container-lowest": "#0b0e13",
          "surface-container":        "#1d2025",
          "surface-container-high":   "#272a30",
          "primary":                  "#ffd57e",
          "primary-container":        "#e8b84b",
          "on-primary-container":     "#3a2a00",
          "on-surface":               "#e1e2e9",
          "on-surface-variant":       "#d2c5b0",
          "outline":                  "#9b8f7c",
          "outline-variant":          "#4e4636",
          "background":               "#111319",
          "secondary":                "#c5c0ff",
          "error":                    "#ffb4ab"
        },
        borderRadius: { "DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px" },
        fontFamily:   { "headline":["Inter"],"body":["Inter"],"label":["Inter"] }
      }
    }
  }
</script>
<style>
  body { font-family:'Inter',sans-serif; background-color:#111319; }
  .ambient-glow {
    position:absolute; width:600px; height:600px;
    background:radial-gradient(circle,rgba(240,192,82,0.08) 0%,rgba(17,19,25,0) 70%);
    top:50%; left:50%; transform:translate(-50%,-50%);
    z-index:0; pointer-events:none;
  }
  .glass-card { background:rgba(29,32,37,0.8); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); }
  .gold-gradient-btn { background:linear-gradient(135deg,#ffd57e 0%,#e8b84b 100%); }
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24; }
  .spinner {
    display:inline-block; width:14px; height:14px;
    border:2px solid rgba(58,42,0,0.3); border-top-color:#3a2a00;
    border-radius:50%; animation:spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Recessed input style from Stitch design system */
  .atelier-input {
    width:100%; background:#0b0e13; border:none;
    border-bottom:2px solid transparent;
    border-radius:0.5rem 0.5rem 0 0;
    padding:14px 14px 14px 44px;
    color:#e1e2e9; font-family:'Inter',sans-serif;
    font-size:0.875rem; font-weight:300;
    outline:none; transition:border-color 0.2s ease;
  }
  .atelier-input::placeholder { color:rgba(155,143,124,0.5); }
  .atelier-input:focus { border-bottom-color:#e8b84b; }
</style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col overflow-hidden">

<!-- Ambient glow -->
<div class="ambient-glow"></div>

<!-- Main -->
<main class="flex-grow flex items-center justify-center relative z-10 px-6 py-12">
  <div class="w-full max-w-md">

    <!-- Brand anchor -->
    <div class="flex flex-col items-center mb-12">
      <a href="index.html" class="text-[#e8b84b] text-5xl font-black tracking-[-0.06em] uppercase mb-2 hover:opacity-80 transition-opacity">MIRAI</a>
      <div class="font-light text-[10px] uppercase tracking-[0.3em] text-outline">ATELIER HUB</div>
    </div>

    <!-- Form card -->
    <div class="glass-card rounded-xl p-10 shadow-2xl border border-outline-variant/10">
      <div class="mb-8 text-center">
        <h1 class="text-2xl font-semibold tracking-tight text-on-surface mb-2">Sign In</h1>
        <p class="font-bold text-[10px] uppercase tracking-widest text-primary/60">Internal Team Access Only</p>
      </div>

      <!-- Error message -->
      <div id="errorMsg" class="hidden mb-6 px-4 py-3 rounded-lg bg-error/10 border border-error/20 text-error text-xs font-medium leading-relaxed"></div>

      <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-6">
        <!-- Username -->
        <div class="space-y-1.5">
          <label class="font-bold text-[10px] uppercase tracking-widest text-outline block ml-1">Username</label>
          <div class="relative group">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-sm" style="font-size:1.1rem">person</span>
            <input class="atelier-input" id="loginUsername" type="text" placeholder="username_kamu" autocomplete="username" required/>
          </div>
        </div>
        <!-- Password -->
        <div class="space-y-1.5">
          <div class="flex justify-between items-center px-1">
            <label class="font-bold text-[10px] uppercase tracking-widest text-outline block">Password</label>
          </div>
          <div class="relative group">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-sm" style="font-size:1.1rem">lock</span>
            <input class="atelier-input" id="loginPassword" type="password" placeholder="••••••••" required/>
          </div>
        </div>
        <!-- CTA -->
        <button type="submit" id="loginBtn"
          class="gold-gradient-btn w-full text-on-primary-container font-bold py-4 rounded-lg shadow-lg hover:opacity-90 active:scale-[0.98] transition-all duration-200 mt-4 flex items-center justify-center gap-2">
          <span class="font-bold text-[12px] uppercase tracking-widest">Enter Atelier</span>
          <span class="material-symbols-outlined text-base">arrow_forward</span>
        </button>
      </form>

      <!-- Register link -->
      <div class="mt-8 text-center">
        <p class="font-light text-xs text-outline">
          Belum punya akun?
          <a href="register.html" class="text-primary font-semibold hover:underline ml-1">Buat akun baru</a>
        </p>
      </div>
    </div>

    <!-- Decorative footer detail -->
    <div class="mt-12 flex justify-center items-center opacity-20 pointer-events-none gap-4">
      <div class="h-px w-12 bg-outline-variant"></div>
      <span class="material-symbols-outlined text-xs text-outline-variant">auto_awesome</span>
      <div class="h-px w-12 bg-outline-variant"></div>
    </div>

  </div>
</main>

<!-- Footer -->
<footer class="w-full px-8 py-8 mt-auto flex flex-col items-center gap-4 bg-transparent">
  <div class="flex gap-6 mb-2">
    <a class="font-light text-[10px] uppercase tracking-widest text-slate-600 hover:text-[#ffd57e] transition-colors" href="index.html">Home</a>
    <a class="font-light text-[10px] uppercase tracking-widest text-slate-600 hover:text-[#ffd57e] transition-colors" href="register.html">Buat Akun</a>
  </div>
  <p class="font-light text-[10px] uppercase tracking-widest text-slate-600">© 2026 MIRAI ATELIER. THE NOIR ATELIER EXPERIENCE.</p>
</footer>

<script>
  // Redirect if already logged in
  (async () => {
    const { data: { session } } = await db.auth.getSession();
    if (session) {
      const { data: profile } = await db.from('profiles').select('role').eq('id', session.user.id).single();
      window.location.href = (profile?.role === 'admin') ? 'admin.html' : 'dashboard.html';
    }
  })();

  function toEmail(username) {
    return `${username.toLowerCase().trim()}@example.com`;
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.remove('hidden');
  }
  function hideError() {
    document.getElementById('errorMsg').classList.add('hidden');
  }

  async function handleLogin(e) {
    e.preventDefault();
    hideError();
    const btn = document.getElementById('loginBtn');
    const username = document.getElementById('loginUsername').value.trim().toLowerCase();
    const password = document.getElementById('loginPassword').value;

    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span><span class="font-bold text-[12px] uppercase tracking-widest ml-2">Masuk...</span>`;

    try {
      const { data, error } = await db.auth.signInWithPassword({
        email: toEmail(username),
        password
      });

      if (error) {
        showError('Username atau password salah.');
        btn.disabled = false;
        btn.innerHTML = `<span class="font-bold text-[12px] uppercase tracking-widest">Enter Atelier</span><span class="material-symbols-outlined text-base">arrow_forward</span>`;
        return;
      }

      const { data: profile } = await db.from('profiles').select('role').eq('id', data.user.id).single();
      window.location.href = (profile?.role === 'admin') ? 'admin.html' : 'dashboard.html';
    } catch (err) {
      showError('Koneksi gagal. Cek konfigurasi Supabase.');
      btn.disabled = false;
      btn.innerHTML = `<span class="font-bold text-[12px] uppercase tracking-widest">Enter Atelier</span><span class="material-symbols-outlined text-base">arrow_forward</span>`;
    }
  }
</script>
</body>
</html>
