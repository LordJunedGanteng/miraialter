<!DOCTYPE html>
<html class="dark" lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MIRAI ATELIER — Team Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/titlebar.js" defer></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "surface-container-lowest": "#0b0e13",
          "surface-container":        "#1d2025",
          "surface-container-high":   "#272a30",
          "primary":                  "#ffd57e",
          "primary-container":        "#e8b84b",
          "on-primary-container":     "#3a2a00",
          "on-surface":               "#e1e2e9",
          "on-surface-variant":       "#d2c5b0",
          "outline":                  "#9b8f7c",
          "outline-variant":          "#4e4636",
          "background":               "#111319",
          "secondary":                "#c5c0ff",
          "error":                    "#ffb4ab"
        },
        borderRadius: { "DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px" },
        fontFamily:   { "headline":["Inter"],"body":["Inter"],"label":["Inter"] }
      }
    }
  }
</script>
<style>
  body { font-family:'Inter',sans-serif; background-color:#111319; }
  .ambient-glow {
    position:absolute; width:600px; height:600px;
    background:radial-gradient(circle,rgba(240,192,82,0.08) 0%,rgba(17,19,25,0) 70%);
    top:50%; left:50%; transform:translate(-50%,-50%);
    z-index:0; pointer-events:none;
  }
  .glass-card { background:rgba(29,32,37,0.8); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); }
  .gold-gradient-btn { background:linear-gradient(135deg,#ffd57e 0%,#e8b84b 100%); }
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24; }
  .spinner {
    display:inline-block; width:14px; height:14px;
    border:2px solid rgba(58,42,0,0.3); border-top-color:#3a2a00;
    border-radius:50%; animation:spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── INPUT FIELD — Noir Atelier "recessed" style ── */
  .input-wrap { position:relative; }
  .input-icon {
    position:absolute; left:14px; top:50%; transform:translateY(-50%);
    color:#9b8f7c; pointer-events:none;
    font-size:1rem; width:20px; height:20px;
    display:flex; align-items:center; justify-content:center;
    line-height:1; overflow:hidden;
    transition:color 0.2s ease;
  }
  .atelier-input {
    width:100%;
    background:#191c21;
    border:1.5px solid rgba(78,70,54,0.25);
    border-bottom:2px solid rgba(78,70,54,0.35);
    border-radius:12px 12px 4px 4px;
    padding:15px 16px 15px 44px;
    color:#e1e2e9; font-family:'Inter',sans-serif;
    font-size:0.875rem; font-weight:300;
    letter-spacing:0.02em; outline:none;
    transition:border-color 0.22s ease, background 0.22s ease, box-shadow 0.22s ease;
  }
  .atelier-input::placeholder { color:rgba(155,143,124,0.35); letter-spacing:0.05em; }
  .atelier-input:hover { background:#1d2025; border-color:rgba(78,70,54,0.45); }
  .atelier-input:focus {
    background:#1d2025;
    border-color:rgba(78,70,54,0.2);
    border-bottom:2px solid #ffd57e;
    box-shadow:0 4px 24px rgba(232,184,75,0.08);
  }
  .input-wrap:focus-within .input-icon { color:#e8b84b; }
  .atelier-input:-webkit-autofill,
  .atelier-input:-webkit-autofill:hover,
  .atelier-input:-webkit-autofill:focus {
    -webkit-box-shadow:0 0 0 1000px #1d2025 inset !important;
    -webkit-text-fill-color:#e1e2e9 !important;
    border-bottom-color:#ffd57e !important;
    caret-color:#e1e2e9;
  }
</style>
</head>
<body class="bg-background min-h-screen flex flex-col items-center selection:bg-primary/30">

<div class="ambient-glow"></div>

<!-- Top bar -->
<header class="bg-background w-full z-50 sticky top-0">
  <div class="flex items-center justify-between px-6 py-4 w-full max-w-7xl mx-auto">
    <a href="index.html" class="text-outline hover:text-on-surface transition-colors">
      <span class="material-symbols-outlined">arrow_back</span>
    </a>
    <a href="index.html" class="font-extrabold tracking-[-0.04em] uppercase text-2xl text-[#e8b84b] hover:opacity-80 transition-opacity">
      MIRAI
    </a>
    <div class="w-6"></div>
  </div>
</header>

<main class="flex-grow flex items-center justify-center w-full px-6 py-12">
  <div class="max-w-md w-full relative">

    <!-- Corner decorative lines -->
    <div class="absolute -top-12 -left-12 w-24 h-24 border-l border-t border-outline-variant/20 pointer-events-none"></div>

    <div class="space-y-12">

      <!-- Title -->
      <div class="text-center md:text-left">
        <label class="font-bold uppercase tracking-[0.05em] text-[10px] text-primary mb-2 block">Login</label>
        <h1 class="text-5xl md:text-6xl font-extrabold tracking-[-0.04em] text-on-surface">
          Welcome<br/>Back
        </h1>
      </div>

      <!-- Error message -->
      <div id="errorMsg" class="hidden px-4 py-3 rounded-lg bg-error/10 border border-error/20 text-error text-xs font-medium leading-relaxed"></div>

      <!-- Form -->
      <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-6">
        <div class="grid grid-cols-1 gap-7">
          <!-- Username -->
          <div>
            <label class="font-bold text-[10px] uppercase tracking-[0.15em] text-outline mb-2.5 block">Username</label>
            <div class="input-wrap">
              <span class="material-symbols-outlined input-icon">alternate_email</span>
              <input class="atelier-input" id="loginUsername" type="text" placeholder="username_kamu" autocomplete="username" required/>
            </div>
          </div>
          <!-- Password -->
          <div>
            <label class="font-bold text-[10px] uppercase tracking-[0.15em] text-outline mb-2.5 block">Password</label>
            <div class="input-wrap">
              <span class="material-symbols-outlined input-icon">lock</span>
              <input class="atelier-input" id="loginPassword" type="password" placeholder="••••••••" required/>
            </div>
          </div>
        </div>

        <!-- Actions -->
        <div class="pt-4 space-y-6">
          <button type="submit" id="loginBtn"
            class="gold-gradient-btn w-full py-4 rounded-lg text-on-primary-container font-bold text-sm uppercase tracking-widest hover:opacity-90 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2">
            <span id="loginBtnText">Enter Atelier</span>
            <span class="material-symbols-outlined text-base" id="loginBtnIcon">arrow_forward</span>
          </button>

          <div class="flex flex-col items-center gap-4">
            <p class="text-[10px] font-light text-outline uppercase tracking-widest">Belum punya akun?</p>
            <a href="register.html"
              class="text-primary text-[11px] font-bold uppercase tracking-[0.1em] hover:text-primary-container transition-colors flex items-center gap-2 group">
              Buat Akun Baru
              <span class="material-symbols-outlined text-sm transition-transform group-hover:translate-x-1">arrow_forward</span>
            </a>
          </div>
        </div>
      </form>
    </div>
  </div>
</main>

<!-- Footer -->
<footer class="bg-transparent w-full py-8 mt-auto flex flex-col items-center gap-4 px-8">
  <div class="flex gap-6 mb-2">
    <a class="font-light text-[10px] uppercase tracking-widest text-slate-600 hover:text-[#ffd57e] transition-colors" href="index.html">Home</a>
    <a class="font-light text-[10px] uppercase tracking-widest text-slate-600 hover:text-[#ffd57e] transition-colors" href="register.html">Buat Akun</a>
  </div>
  <p class="font-light text-[10px] uppercase tracking-widest text-[#e8b84b]/40">© 2026 MIRAI ATELIER. THE NOIR ATELIER EXPERIENCE.</p>
</footer>

<script>
  // Redirect if already logged in
  (async () => {
    const { data: { session } } = await db.auth.getSession();
    if (session) {
      const { data: profile } = await db.from('profiles').select('role').eq('id', session.user.id).single();
      window.location.href = (profile?.role === 'admin') ? 'admin.html' : 'dashboard.html';
    }
  })();

  function toEmail(username) {
    return `${username.toLowerCase().trim()}@example.com`;
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.remove('hidden');
  }
  function hideError() {
    document.getElementById('errorMsg').classList.add('hidden');
  }

  async function handleLogin(e) {
    e.preventDefault();
    hideError();
    const btn = document.getElementById('loginBtn');
    const username = document.getElementById('loginUsername').value.trim().toLowerCase();
    const password = document.getElementById('loginPassword').value;

    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span><span class="font-bold text-[12px] uppercase tracking-widest ml-2">Masuk...</span>`;

    try {
      const { data, error } = await db.auth.signInWithPassword({
        email: toEmail(username),
        password
      });

      if (error) {
        showError('Username atau password salah.');
        btn.disabled = false;
        btn.innerHTML = `<span class="font-bold text-[12px] uppercase tracking-widest">Enter Atelier</span><span class="material-symbols-outlined text-base">arrow_forward</span>`;
        return;
      }

      const { data: profile } = await db.from('profiles').select('role').eq('id', data.user.id).single();
      window.location.href = (profile?.role === 'admin') ? 'admin.html' : 'dashboard.html';
    } catch (err) {
      showError('Koneksi gagal. Cek konfigurasi Supabase.');
      btn.disabled = false;
      btn.innerHTML = `<span class="font-bold text-[12px] uppercase tracking-widest">Enter Atelier</span><span class="material-symbols-outlined text-base">arrow_forward</span>`;
    }
  }
</script>
</body>
</html>
